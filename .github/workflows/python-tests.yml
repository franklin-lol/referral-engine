name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install ".[test]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check import health
        run: |
          python -c "from referral_engine.config import EngineConfig; print('config OK')"
          python -c "from referral_engine.engine import ReferralEngine; print('engine OK')"
          python -c "from referral_engine.adapters.memory import MemoryAdapter; print('memory adapter OK')"
          python -c "from referral_engine.batch import BatchDistributor; print('batch OK')"
          python -c "from referral_engine.hooks import HookRegistry; print('hooks OK')"